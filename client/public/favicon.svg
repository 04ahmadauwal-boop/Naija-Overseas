<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded green background -->
  <rect width="32" height="32" rx="8" fill="#15803d"/>
  <!-- Subtle top-left shine -->
  <ellipse cx="8" cy="6" rx="10" ry="6" fill="white" opacity="0.1"/>

  <!-- Mortarboard flat board (diamond) -->
  <path d="M16 5.5 L27 12 L16 18.5 L5 12 Z" fill="white"/>

  <!-- Cap body / crown -->
  <path d="M10 15 L10 22 Q10 26.5 16 26.5 Q22 26.5 22 22 L22 15 L16 18.5 Z" fill="#86efac"/>

  <!-- Tassel cord -->
  <line x1="27" y1="12" x2="27" y2="21" stroke="#fde047" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel ball -->
  <circle cx="27" cy="23" r="2" fill="#fde047"/>
  <!-- Tassel fringe -->
  <line x1="26" y1="25" x2="25" y2="29" stroke="#fde047" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="25" x2="27" y2="29" stroke="#fde047" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="25" x2="29" y2="29" stroke="#fde047" stroke-width="1.5" stroke-linecap="round"/>
</svg>
